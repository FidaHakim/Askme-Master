<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AskMe | FidaHakim</title>
    <script src="https://js.puter.com/v2/"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        :root { 
            --bg: #0e0e10; --side: #18191b; --accent: #8ab4f8; --text: #e3e3e3; --input-bg: #1e1f20;
            --nav-w: 260px; --nav-c: 72px; --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Google Sans', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* RGB EFFECT FOR LOGO */
        @keyframes rgb-cycle {
            0% { color: #ff4d4d; text-shadow: 0 0 8px rgba(255, 77, 77, 0.3); }
            33% { color: #4dff4d; text-shadow: 0 0 8px rgba(77, 255, 77, 0.3); }
            66% { color: #4d4dff; text-shadow: 0 0 8px rgba(77, 77, 255, 0.3); }
            100% { color: #ff4d4d; text-shadow: 0 0 8px rgba(255, 77, 77, 0.3); }
        }
        .rgb-logo { animation: rgb-cycle 4s linear infinite; font-weight: bold; display: flex; align-items: center; gap: 12px; }

        /* SIDEBAR / SLIDING RAIL */
        nav { width: var(--nav-w); background: var(--side); padding: 15px; display: flex; flex-direction: column; border-right: 1px solid #2d2e30; transition: width var(--transition); z-index: 1000; flex-shrink: 0; }
        nav.collapsed { width: var(--nav-c); }
        nav.collapsed .nav-text, nav.collapsed .logo-text { display: none; }
        nav.collapsed .nav-item { justify-content: center; padding: 12px 0; }

        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 25px; cursor: pointer; transition: 0.2s; color: #c4c7c5; text-decoration: none; white-space: nowrap; overflow: hidden; margin-bottom: 4px; }
        .nav-item:hover { background: #2d2e30; color: #fff; }
        
        /* CHAT AREA */
        main { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; height: 100%; }
        .chat-container { flex: 1; overflow-y: auto; padding: 40px 15% 180px 15%; scroll-behavior: smooth; }
        .msg { margin-bottom: 32px; animation: fadeIn 0.4s ease; border-bottom: 1px solid #232426; padding-bottom: 24px; line-height: 1.7; font-size: 16px; }
        .label { font-weight: 500; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        
        .gradient-text { font-size: clamp(32px, 7vw, 56px); font-weight: 500; background: linear-gradient(to right, #4285f4, #9b72cb, #d96570, #4285f4); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: flow 4s linear infinite; }
        @keyframes flow { to { background-position: 200%; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* INPUT CARD & PILLS */
        .input-area { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 850px; z-index: 10; }
        .input-card { background: var(--input-bg); border-radius: 32px; border: 1px solid #444; padding: 6px 14px; display: flex; flex-direction: column; box-shadow: 0 12px 40px rgba(0,0,0,0.6); }
        
        #filePill { display: none; align-items: center; gap: 8px; background: #2d2e30; padding: 8px 14px; border-radius: 16px; font-size: 13px; margin: 8px 12px; width: fit-content; border: 1px solid #555; }
        
        .input-row { display: flex; align-items: center; gap: 4px; }
        input[type="text"] { flex: 1; background: none; border: none; color: #fff; padding: 14px; font-size: 16px; font-family: inherit; }
        
        /* BUTTONS */
        .btn { background: none; border: none; color: #c4c7c5; cursor: pointer; padding: 10px; border-radius: 50%; display: flex; align-items: center; transition: 0.2s; }
        .btn:hover { background: #333; color: #fff; }
        .btn.mic-active { color: #ff4d4d; background: rgba(255, 77, 77, 0.1); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 77, 77, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); } }

        /* THINKING DOTS */
        .dots { display: flex; gap: 5px; padding: 12px 0; }
        .dot { height: 8px; width: 8px; background: var(--accent); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.2s; } .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0.3); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }

        @media (max-width: 768px) {
            nav { position: fixed; height: 100%; transform: translateX(-100%); width: 260px; }
            nav.mobile-open { transform: translateX(0); }
            .chat-container { padding: 80px 5% 150px 5%; }
        }
    </style>
</head>
<body>

    <nav id="sidebar">
        <button class="btn" onclick="app.toggleNav()"><span class="material-symbols-rounded">menu</span></button>
        
        <div class="nav-item rgb-logo" style="font-size: 20px; pointer-events: none; margin-top: 10px;">
            <span class="material-symbols-rounded">bolt</span>
            <span class="logo-text">AskMe</span>
        </div>

        <div class="nav-item" onclick="app.newChat()"><span class="material-symbols-rounded">add</span><span class="nav-text">New Chat</span></div>
        <div class="nav-item"><span class="material-symbols-rounded">history</span><span class="nav-text">Activity</span></div>
        <div class="nav-item" style="margin-top: auto;" onclick="app.session()"><span class="material-symbols-rounded">account_circle</span><span class="nav-text">Session</span></div>
    </nav>

    <main>
        <div class="chat-container" id="chat">
            <div id="welcome">
                <h1 class="gradient-text">Hello, FidaHakim</h1>
                <p style="font-size: 20px; color: #888;">Modern AI developed in Gafargaon.</p>
            </div>
        </div>

        <div class="input-area">
            <div class="input-card">
                <div id="filePill">
                    <span class="material-symbols-rounded" style="font-size:18px">description</span>
                    <span id="fileName">document.txt</span>
                    <span class="material-symbols-rounded" style="font-size:18px; cursor:pointer; margin-left:5px; color:#ff6b6b;" onclick="files.clear()">close</span>
                </div>
                <div class="input-row">
                    <button class="btn" onclick="document.getElementById('fileIn').click()"><span class="material-symbols-rounded">add_circle</span></button>
                    <input type="file" id="fileIn" hidden onchange="files.process(event)">
                    
                    <input type="text" id="userInput" placeholder="Ask AskMe anything..." autocomplete="off">
                    
                    <button class="btn" id="micBtn" onclick="voice.toggle()"><span class="material-symbols-rounded">mic</span></button>
                    <button class="btn" onclick="ai.send()" style="color:var(--accent)"><span class="material-symbols-rounded">send</span></button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const state = { fileData: "", fileName: "", isListening: false };

        const app = {
            toggleNav: () => {
                const nav = document.getElementById('sidebar');
                window.innerWidth <= 768 ? nav.classList.toggle('mobile-open') : nav.classList.toggle('collapsed');
            },
            newChat: () => { location.reload(); },
            append: (role, content, isAi = false) => {
                const chat = document.getElementById('chat');
                if(document.getElementById('welcome')) document.getElementById('welcome').style.display = 'none';
                const id = isAi ? `ai-${Date.now()}` : '';
                const template = `
                    <div class="msg" id="${id}">
                        <div class="label" style="color:${isAi ? '#d96570' : '#8ab4f8'}">
                            <span class="material-symbols-rounded">${isAi ? 'smart_toy' : 'person'}</span> ${role}
                        </div>
                        <div class="content">${content}</div>
                    </div>`;
                chat.insertAdjacentHTML('beforeend', template);
                chat.scrollTop = chat.scrollHeight;
                return id;
            },
            session: async () => {
                try {
                    const user = await puter.auth.getUser() || await puter.auth.signIn();
                    alert(`Active Session: ${user.username}`);
                } catch(e) { console.log("Auth error"); }
            }
        };

        const files = {
            process: (e) => {
                const file = e.target.files[0];
                if (!file) return;
                state.fileName = file.name;
                document.getElementById('fileName').innerText = file.name;
                document.getElementById('filePill').style.display = 'flex';
                const reader = new FileReader();
                reader.onload = (ev) => { state.fileData = `\n\n[USER FILE: ${file.name}]\n${ev.target.result}\n`; };
                reader.readAsText(file);
            },
            clear: () => {
                state.fileData = ""; state.fileName = "";
                document.getElementById('fileIn').value = "";
                document.getElementById('filePill').style.display = 'none';
            }
        };

        const voice = {
            recognition: null,
            init: () => {
                const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
                if(!Speech) return null;
                const r = new Speech();
                r.onstart = () => { state.isListening = true; document.getElementById('micBtn').classList.add('mic-active'); };
                r.onend = () => { state.isListening = false; document.getElementById('micBtn').classList.remove('mic-active'); };
                r.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; };
                return r;
            },
            toggle: () => {
                if(!voice.recognition) voice.recognition = voice.init();
                if(!voice.recognition) return alert("Browser not supported.");
                state.isListening ? voice.recognition.stop() : voice.recognition.start();
            }
        };

        const ai = {
            send: async () => {
                const input = document.getElementById('userInput');
                const text = input.value.trim();
                const lowerText = text.toLowerCase();
                if(!text && !state.fileData) return;

                app.append("You", text + (state.fileName ? `<br><small style='opacity:0.6'>📎 ${state.fileName}</small>` : ""));
                const aiId = app.append("AskMe", `<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`, true);
                
                const prompt = text + state.fileData;
                input.value = ""; files.clear();

                // Identity Override Logic
                if(lowerText.includes("who made you") || lowerText.includes("who build you") || lowerText.includes("developer") || lowerText.includes("fidahakim")) {
                    setTimeout(() => {
                        document.getElementById(aiId).querySelector('.content').innerHTML = "I was developed by <b>FidaHakim</b>, a talented developer from <b>Gafargaon, Bangladesh</b>. He built me to be your ultimate high-performance assistant!";
                        document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
                    }, 600);
                    return;
                }

                try {
                    const res = await puter.ai.chat(prompt, {
                        model: 'google/gemini-3-flash-preview',
                        system_prompt: "You are AskMe, a high-performance AI developed by FidaHakim from Gafargaon, Bangladesh. You are smart, fast, and helpful."
                    });
                    document.getElementById(aiId).querySelector('.content').innerHTML = res.message?.content || res;
                } catch (err) {
                    document.getElementById(aiId).querySelector('.content').innerText = "Error: " + err.message;
                }
                document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
            }
        };

        document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') ai.send(); });
    </script>
</body>
</html>
